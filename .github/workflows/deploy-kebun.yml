name: Deploy Kebun to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build boot JAR
        run: ./gradlew --no-daemon bootJar

      - name: Resolve deployable JAR
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "No deployable JAR found in build/libs"
            ls -la build/libs || true
            exit 1
          fi
          echo "jar_path=${JAR_PATH}" >> "${GITHUB_OUTPUT}"
          echo "Resolved deployable JAR: ${JAR_PATH}"

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.KEBUN_EC2_SSH_KEY }}" > ~/.ssh/kebun_key.pem
          chmod 600 ~/.ssh/kebun_key.pem

      - name: Upload JAR to EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.KEBUN_EC2_HOST }}
          EC2_USER: ${{ secrets.KEBUN_EC2_USER }}
          JAR_PATH: ${{ steps.jar.outputs.jar_path }}
        run: |
          set -euo pipefail
          scp -o StrictHostKeyChecking=no -i ~/.ssh/kebun_key.pem "${JAR_PATH}" "${EC2_USER}@${EC2_HOST}:/tmp/app.jar"

      - name: Deploy and verify on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.KEBUN_EC2_HOST }}
          EC2_USER: ${{ secrets.KEBUN_EC2_USER }}
          APP_DIR: ${{ secrets.KEBUN_EC2_APP_DIR }}
          SERVICE_NAME: ${{ secrets.KEBUN_EC2_SERVICE_NAME }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/kebun_key.pem "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail
            sudo install -m 644 /tmp/app.jar ${APP_DIR}/app.jar
            rm -f /tmp/app.jar

            if ! sudo systemctl restart ${SERVICE_NAME}; then
              sudo journalctl -u ${SERVICE_NAME} -n 100 --no-pager || true
              exit 1
            fi

            if ! sudo systemctl is-active --quiet ${SERVICE_NAME}; then
              sudo systemctl --no-pager --full status ${SERVICE_NAME} || true
              sudo journalctl -u ${SERVICE_NAME} -n 100 --no-pager || true
              exit 1
            fi

            sudo systemctl --no-pager --full status ${SERVICE_NAME} | head -n 20 || true

            if ! curl -fsS http://localhost:8081/actuator/health; then
              sudo journalctl -u ${SERVICE_NAME} -n 100 --no-pager || true
              exit 1
            fi

            if ! curl -fsS http://localhost:8081/actuator/prometheus > /dev/null; then
              sudo journalctl -u ${SERVICE_NAME} -n 100 --no-pager || true
              exit 1
            fi"
