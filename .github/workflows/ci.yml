name: CI Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew clean test --no-daemon

      - name: Generate JaCoCo report
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Build Spring Boot JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs/*.jar

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: SonarCloud analysis with coverage
        run: ./gradlew clean test jacocoTestReport sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-aws:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - sonarcloud

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Spring Boot JAR
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem build/libs/*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/be-management-kebun/app.jar

      - name: Restart Spring Boot app
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            pkill -f 'java -jar /opt/be-management-kebun/app.jar' || true
            nohup java -jar /opt/be-management-kebun/app.jar > /opt/be-management-kebun/app.log 2>&1 &
            sleep 8
            tail -n 80 /opt/be-management-kebun/app.log
          EOF

  deploy-monitoring:
    name: Deploy Prometheus and Grafana
    runs-on: ubuntu-latest
    needs: deploy-aws

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy monitoring stack to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            sudo dnf install -y docker
            sudo systemctl enable docker
            sudo systemctl start docker

            sudo mkdir -p /opt/mysawit-monitoring/grafana/provisioning/datasources
            sudo mkdir -p /opt/mysawit-monitoring/grafana/provisioning/dashboards
            sudo mkdir -p /opt/mysawit-monitoring/grafana/dashboards
            sudo chown -R ec2-user:ec2-user /opt/mysawit-monitoring

            cat > /opt/mysawit-monitoring/prometheus.yml << 'PROMEOF'
            global:
              scrape_interval: 5s

            scrape_configs:
              - job_name: "kebun-service"
                metrics_path: "/actuator/prometheus"
                static_configs:
                  - targets: ["host.docker.internal:8080"]
            PROMEOF

            cat > /opt/mysawit-monitoring/docker-compose.monitoring.yml << 'COMPOSEEOF'
            services:
              prometheus:
                image: prom/prometheus:latest
                container_name: mysawit-prometheus
                restart: unless-stopped
                ports:
                  - "9090:9090"
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                volumes:
                  - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
                  - prometheus-data:/prometheus
                command:
                  - "--config.file=/etc/prometheus/prometheus.yml"

              grafana:
                image: grafana/grafana:latest
                container_name: mysawit-grafana
                restart: unless-stopped
                ports:
                  - "3001:3000"
                environment:
                  - GF_SECURITY_ADMIN_USER=admin
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                volumes:
                  - grafana-data:/var/lib/grafana
                depends_on:
                  - prometheus

            volumes:
              prometheus-data:
              grafana-data:
            COMPOSEEOF

            cd /opt/mysawit-monitoring

            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.monitoring.yml up -d
            else
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              docker-compose -f docker-compose.monitoring.yml up -d
            fi

            sleep 10
            curl -f http://localhost:9090/-/ready
            docker ps
          EOF