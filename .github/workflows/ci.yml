name: CI Pipeline

on:
  push:
    branches:
      - main
      - staging
      - 'chore/**'
      - 'feat/**'
      - 'refactor/**'
      - 'docs/**'
      - 'ci/**'
      - 'test/**'
  pull_request:
    branches:
      - main
      - staging

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build Spring Boot JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs/*.jar

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: SonarCloud analysis with coverage
        run: ./gradlew clean test jacocoTestReport sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}


  deploy-aws:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - sonarcloud

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Spring Boot JAR
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Copy JAR to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem build/libs/*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/be-management-kebun/app.jar

      - name: Restart Spring Boot app
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            pkill -f 'java -jar /opt/be-management-kebun/app.jar' || true
            nohup java -jar /opt/be-management-kebun/app.jar > /opt/be-management-kebun/app.log 2>&1 &
            sleep 8
            tail -n 80 /opt/be-management-kebun/app.log
          EOF
