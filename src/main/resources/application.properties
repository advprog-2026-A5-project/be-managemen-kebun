spring.application.name=be-management-kebun
server.port=${SERVER_PORT:8081}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kebun_db}
spring.datasource.username=${DB_USERNAME:kebun_user}
spring.datasource.password=${DB_PASSWORD:kebun_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

