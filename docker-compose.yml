version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: be-management-kebun-postgis
    environment:
      POSTGRES_DB: kebun_db
      POSTGRES_USER: kebun_user
      POSTGRES_PASSWORD: kebun_pass
    ports:
    - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kebun_user -d kebun_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
